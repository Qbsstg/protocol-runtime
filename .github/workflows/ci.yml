name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify on JDK 21
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify
        run: mvn -q verify

      - name: Standalone TCP smoke
        run: sh examples/smoke-standalone.sh

      - name: Standalone HTTP smoke
        run: sh examples/smoke-standalone-http.sh

      - name: Distribution package smoke
        run: sh examples/smoke-distribution-package.sh

      - name: Release artifact smoke
        run: sh examples/smoke-release-artifact.sh
