name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Verify on JDK 21
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify
        run: mvn -q verify
