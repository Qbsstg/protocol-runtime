# Minimal standalone IEC104 Kafka collector configuration.
#
# Build first:
#   mvn -q -pl runtime-app -am package
#
# Run:
#   java -jar runtime-app/target/runtime-app-0.9.0-standalone.jar \
#     --config examples/collector-kafka.properties
#
# The app subscribes to the configured Kafka topic and treats each record value
# as a raw protocol payload. Start a local broker separately before using this
# example in a real run.

collector.sources=station-1
collector.source.station-1.id=iec104:station-1
collector.source.station-1.protocol=iec104

collector.kafka.consumers=kafka-main
collector.kafka.consumer.kafka-main.bootstrapServers=localhost:9092
collector.kafka.consumer.kafka-main.groupId=protocol-runtime
collector.kafka.consumer.kafka-main.topics=iec104-raw
collector.kafka.consumer.kafka-main.source=station-1
collector.kafka.consumer.kafka-main.sourceIdMode=CONFIGURED
collector.kafka.consumer.kafka-main.autoOffsetReset=latest
collector.kafka.consumer.kafka-main.commitMode=AFTER_ACCEPT
collector.kafka.consumer.kafka-main.maxPollRecords=100
collector.kafka.consumer.kafka-main.pollTimeoutMillis=1000

collector.backpressure=ACCEPT
collector.backpressure.maxPayloadBytes=0
collector.backpressure.oversizedPayloadDecision=DROP
collector.backpressure.sinkFailureThreshold=0
collector.backpressure.sinkFailureDecision=RETRY_LATER

collector.sink.type=file
collector.sink.file=target/runtime-kafka-records.ndjson
collector.sink.file.maxBytes=10485760
collector.sink.file.maxHistory=5

collector.iec104.strictAsduParsing=false
