# Production-style standalone IEC104 TCP collector profile.
#
# This file is an operator-owned template. Copy it into your deployment
# directory, set host/port/source/sink/management token values, then validate:
#
#   java -jar runtime-app/target/runtime-app-0.13.0-standalone.jar \
#     --validate --config conf/collector.properties --profile production
#
# Start with a dry-run first. Dry-run validates config and exports a configured
# status snapshot without binding ports or connecting to external systems:
#
#   java -jar runtime-app/target/runtime-app-0.13.0-standalone.jar \
#     --dry-run --config conf/collector.properties --profile production \
#     --status-export var/run/status.json

collector.profile=production

# Runtime directory convention. Relative child paths are resolved from this
# directory. Keep this outside the application jar directory on real servers.
collector.runtime.dir=/opt/protocol-runtime
collector.runtime.confDir=conf
collector.runtime.logsDir=logs
collector.runtime.dataDir=data
collector.runtime.runDir=run
collector.runtime.tmpDir=tmp
collector.runtime.pidFile=run/protocol-runtime.pid
collector.runtime.statusFile=run/status.json
collector.runtime.logFile=logs/protocol-runtime.log
collector.runtime.createDirectories=true

collector.tcp.host=0.0.0.0
collector.tcp.port=2404
collector.tcp.bossThreads=1
collector.tcp.workerThreads=2

collector.source.id=iec104:station-1
collector.protocol=iec104
collector.backpressure=ACCEPT
collector.backpressure.maxPayloadBytes=1048576
collector.backpressure.oversizedPayloadDecision=DROP
collector.backpressure.sinkFailureThreshold=10
collector.backpressure.sinkFailureDecision=RETRY_LATER

collector.sink.type=file
collector.sink.file=/opt/protocol-runtime/data/records.ndjson
collector.sink.file.maxBytes=10485760
collector.sink.file.maxHistory=10

collector.iec104.strictAsduParsing=false

collector.management.enabled=true
collector.management.host=127.0.0.1
collector.management.port=8081
collector.management.healthPath=/health
collector.management.readinessPath=/readiness
collector.management.statusPath=/status
collector.management.access=token
collector.management.token=change-me-before-production
collector.management.requestLogging.enabled=true
collector.management.healthHistory.maxEntries=64
