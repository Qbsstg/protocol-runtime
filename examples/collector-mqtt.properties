# Minimal standalone IEC104 MQTT collector configuration.
#
# Build first:
#   mvn -q -pl runtime-app -am package
#
# Run:
#   java -jar runtime-app/target/runtime-app-0.14.0-standalone.jar \
#     --config examples/collector-mqtt.properties
#
# The app subscribes to the configured MQTT topic filters and treats each
# message payload as a raw protocol payload. Start a local MQTT broker
# separately before using this example in a real run.

collector.sources=station-1
collector.source.station-1.id=iec104:station-1
collector.source.station-1.protocol=iec104

collector.mqtt.clients=mqtt-main
collector.mqtt.client.mqtt-main.brokerUri=tcp://localhost:1883
collector.mqtt.client.mqtt-main.clientId=protocol-runtime-station-1
collector.mqtt.client.mqtt-main.topicFilters=iec104/station-1/raw
collector.mqtt.client.mqtt-main.qos=0
collector.mqtt.client.mqtt-main.source=station-1
collector.mqtt.client.mqtt-main.sourceIdMode=CONFIGURED
collector.mqtt.client.mqtt-main.cleanSession=true
collector.mqtt.client.mqtt-main.automaticReconnect=true
collector.mqtt.client.mqtt-main.connectionTimeoutSeconds=30
collector.mqtt.client.mqtt-main.keepAliveSeconds=60

collector.backpressure=ACCEPT
collector.backpressure.maxPayloadBytes=0
collector.backpressure.oversizedPayloadDecision=DROP
collector.backpressure.sinkFailureThreshold=0
collector.backpressure.sinkFailureDecision=RETRY_LATER

collector.sink.type=file
collector.sink.file=target/runtime-mqtt-records.ndjson
collector.sink.file.maxBytes=10485760
collector.sink.file.maxHistory=5

collector.iec104.strictAsduParsing=false
